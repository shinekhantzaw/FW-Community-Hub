<!-- App shell: page background, top navigation, and routed content area. -->
<div class="min-h-screen bg-slate-100 text-slate-800">
  <!-- Header contains brand title and main navigation links. -->
  <header class="bg-slate-900 text-white">
    <div class="mx-auto flex w-full max-w-5xl items-center justify-between gap-4 px-6 py-4">
      <h1 class="text-xl font-semibold tracking-tight">CareConnect</h1>
      <!-- Router links switch pages without a full browser refresh. -->
      <nav class="flex gap-3">
        <a
          routerLink="/"
          routerLinkActive="bg-blue-700 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-700 hover:text-white"
        >
          Home
        </a>
        <a
          routerLink="/resources"
          routerLinkActive="bg-blue-700 text-white"
          class="rounded-md px-3 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-700 hover:text-white"
        >
          Resource List
        </a>
      </nav>
    </div>
  </header>

  <!-- Routed page content is injected here by Angular Router. -->
  <main class="mx-auto w-full max-w-5xl px-6 py-6">
    <router-outlet></router-outlet>
  </main>
</div>
